  <text x="400" y="555" font-family="Raleway, system-ui, sans-serif" font-size="14" font-weight="700" fill="#010744" text-anchor="middle" letter-spacing="6" opacity="0.5">MOREJÁ IMOBILIÁRIA</text>
</svg>
