    <rect x="630" y="280" width="100" height="220"/>
  </g>
  <text x="400" y="450" font-family="Raleway, system-ui, sans-serif" font-size="22" font-weight="700" fill="#f2d22e" text-anchor="middle" letter-spacing="4">EXPERIÊNCIA · CONFIANÇA · ATENDIMENTO</text>
  <text x="400" y="540" font-family="Raleway, system-ui, sans-serif" font-size="14" font-weight="700" fill="#f2d22e" text-anchor="middle" letter-spacing="6" opacity="0.6">MOREJÁ IMOBILIÁRIA · RECIFE / PE</text>
</svg>
