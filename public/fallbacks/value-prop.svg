<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Atendimento Morejá">
  <defs>
    <linearGradient id="gV" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#010744"/>
      <stop offset="0.6" stop-color="#1a1f6e"/>
      <stop offset="1" stop-color="#010744"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#gV)"/>
  <!-- key icon -->
  <g transform="translate(280 200)" fill="#f2d22e">
    <circle cx="60" cy="60" r="50" fill="none" stroke="#f2d22e" stroke-width="14"/>
    <rect x="100" y="50" width="180" height="20"/>
    <rect x="240" y="50" width="14" height="40"/>
    <rect x="270" y="50" width="14" height="40"/>
  </g>
  <!-- subtle building outline -->
