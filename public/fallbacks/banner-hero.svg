    <rect x="520" y="220" width="180" height="280"/>
    <rect x="720" y="280" width="140" height="220"/>
    <rect x="880" y="240" width="160" height="260"/>
    <rect x="1060" y="320" width="120" height="180"/>
  </g>
  <text x="640" y="120" font-family="Raleway, system-ui, sans-serif" font-size="64" font-weight="800" fill="#ffffff" text-anchor="middle">Morejá Imobiliária</text>
  <text x="640" y="180" font-family="Raleway, system-ui, sans-serif" font-size="22" font-weight="500" fill="#f2d22e" text-anchor="middle" letter-spacing="3">RECIFE · OLINDA · METROPOLITANA</text>
</svg>
