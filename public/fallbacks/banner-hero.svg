<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 533" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Banner Morejá Imobiliária">
  <defs>
    <linearGradient id="gB" x1="0" y1="0" x2="1" y2="0.7">
      <stop offset="0" stop-color="#010744"/>
      <stop offset="0.6" stop-color="#1a1f6e"/>
      <stop offset="1" stop-color="#010744"/>
    </linearGradient>
    <pattern id="dB" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#f2d22e" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1280" height="533" fill="url(#gB)"/>
  <rect width="1280" height="533" fill="url(#dB)"/>
  <!-- soft glow -->
  <circle cx="1080" cy="120" r="200" fill="#f2d22e" opacity="0.12"/>
